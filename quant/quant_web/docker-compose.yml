services:
  web:
    build:
      context: ..
      dockerfile: quant_web/Dockerfile
    container_name: quant-web
    restart: always
    expose:
      - "5000"

    environment:
      - TZ=Asia/Shanghai
      - MARKET_STORAGE_MODE=${MARKET_STORAGE_MODE:-xlsx}
      - CRAWLER_HOST=${CRAWLER_HOST:-172.18.0.1}
      - CRAWLER_PORT=${CRAWLER_PORT:-14431}
      - CRAWLER_URL=${CRAWLER_URL:-}
      - CRAWLER_USER=${CRAWLER_USER:-}
      - CRAWLER_PASS=${CRAWLER_PASS:-}
      - CRAWLER_PROXY=${CRAWLER_PROXY:-}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.qq.com}
      - SMTP_PORT=${SMTP_PORT:-465}
      - INVITE_CODE=${INVITE_CODE:-}
      - NOTIFY_EMAIL=${NOTIFY_EMAIL:-}
    volumes:
      # 挂载项目根目录，使 Flask 能实时读取 xlsx/json 文件
      - ..:/app
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  nginx:
    image: nginx:alpine
    container_name: quant-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL 证书映射（certbot 自动生成后挂载）
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # 静态文件让 nginx 直出（更高效）
      - ./static:/app/quant_web/static:ro
    depends_on:
      web:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128m

server {
    listen 1202 ssl;
    server_name terminal.example.com;

    ssl_certificate     /etc/nginx/cert/fullchain.pem;
    ssl_certificate_key /etc/nginx/cert/privkey.pem;

    auth_basic           "TTYD Terminal";
    auth_basic_user_file /etc/nginx/auth/.htpasswd;

    location = /ws {
        if ($cookie_ttyd_auth != "fead7b6a76cb8174aaefd0a372a1a6605298fcd2a7ff9820") {
            return 401;
        }

        auth_basic off;
        proxy_pass http://172.17.0.1:12000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location = /favicon.ico {
        auth_basic off;
        access_log off;
        return 204;
    }

    location = /apple-touch-icon.png {
        auth_basic off;
        access_log off;
        return 204;
    }

    location = /apple-touch-icon-precomposed.png {
        auth_basic off;
        access_log off;
        return 204;
    }

    location / {
        add_header Set-Cookie "ttyd_auth=fead7b6a76cb8174aaefd0a372a1a6605298fcd2a7ff9820; Max-Age=2592000; Path=/; Secure; HttpOnly; SameSite=Lax";
        proxy_pass http://172.17.0.1:12000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPN 配置 (加密)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; padding: 20px; }
  .container { max-width: 400px; margin: 0 auto; }
  .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  h2 { font-size: 18px; margin-bottom: 16px; color: #333; }
  .qr { text-align: center; margin-bottom: 12px; }
  .qr img { width: 200px; height: 200px; }
  .btn { display: block; width: 100%; padding: 14px; background: #4A90D9; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; text-decoration: none; text-align: center; margin-bottom: 8px; }
  .btn:hover { background: #357ABD; }
  .info { font-size: 13px; color: #666; line-height: 1.8; }
  .info label { color: #999; }
  .note { font-size: 12px; color: #999; text-align: center; margin-top: 12px; }
  .highlight { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 8px; padding: 12px; margin-top: 12px; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h2>📱 Shadowrocket 扫码</h2>
    <p style="text-align:center;color:#666;font-size:14px;">生成真实配置后再放置二维码。</p>
  </div>

  <div class="card">
    <h2>⚡ Clash 订阅</h2>
    <a class="btn" href="config.yaml">📋 订阅链接</a>
    <div class="highlight">
      <strong>⚠️ 需要登录</strong><br>
      用户名: <code>admin</code><br>
      密码: 使用部署时生成的 htpasswd
    </div>
  </div>

  <div class="card">
    <h2>📝 配置信息</h2>
    <div class="info">
      <p><label>地址：</label>vpn.example.com</p>
      <p><label>端口：</label>5443</p>
      <p><label>UUID：</label>YOUR_UUID_HERE</p>
      <p><label>协议：</label>VLESS + TLS</p>
      <p><label>flow：</label>xtls-rprx-vision</p>
      <p><label>订阅：</label><a href="config.yaml">config.yaml</a>（需登录）</p>
    </div>
  </div>

  <div class="note">🔒 HTTPS 加密 · 仅管理员可访问 · 证书自动续期</div>
</div>
</body>
</html>

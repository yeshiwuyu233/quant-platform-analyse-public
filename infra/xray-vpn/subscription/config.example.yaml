port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info

proxies:
  - name: VPN-yeshiwuyu
    type: vless
    server: your-domain.com
    port: 5443
    uuid: YOUR_UUID_HERE
    tls: true
    flow: xtls-rprx-vision
    servername: your-domain.com

proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - VPN-yeshiwuyu
      - DIRECT
      - REJECT

rules:
  - MATCH,🚀 节点选择
